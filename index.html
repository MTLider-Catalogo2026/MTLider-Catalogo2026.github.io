<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogos Digitales — Próximamente</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --azul:    #1B3F6E;
    --naranja: #F26522;
    --morado:  #7B2FBE;
    --cielo:   #38A8E0;
    --rosa:    #E8528A;
    --rojo:    #D93025;
    --fondo:   #FAF7F2;
    --texto:   #1A1A1A;
    --gris:    #6B6B6B;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(to right,
      var(--azul) 0 16.6%, var(--naranja) 16.6% 33.2%,
      var(--morado) 33.2% 49.8%, var(--cielo) 49.8% 66.4%,
      var(--rosa) 66.4% 83%, var(--rojo) 83% 100%);
  }

  .dots {
    display: flex; gap: 10px; justify-content: center;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.8s ease both;
  }
  .dot {
    width: 14px; height: 14px; border-radius: 50%;
    animation: bounce 2s ease-in-out infinite;
  }
  .dot:nth-child(1) { background: var(--azul);    animation-delay: 0s; }
  .dot:nth-child(2) { background: var(--naranja);  animation-delay: 0.15s; }
  .dot:nth-child(3) { background: var(--morado);   animation-delay: 0.3s; }
  .dot:nth-child(4) { background: var(--cielo);    animation-delay: 0.45s; }
  .dot:nth-child(5) { background: var(--rosa);     animation-delay: 0.6s; }
  .dot:nth-child(6) { background: var(--rojo);     animation-delay: 0.75s; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-weight: 900; font-size: 1.3rem;
    margin-bottom: 2rem;
    animation: fadeUp 0.8s 0.1s ease both;
  }
  .logo em { font-style: normal; color: var(--naranja); }

  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900; font-size: clamp(2.5rem, 8vw, 5rem);
    letter-spacing: -0.04em; line-height: 1;
    margin-bottom: 1.2rem;
    animation: fadeUp 0.8s 0.2s ease both;
  }
  h1 em { font-style: italic; color: var(--naranja); }

  p {
    font-size: 1rem; color: var(--gris); font-weight: 300;
    line-height: 1.7; max-width: 400px;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .wsp {
    display: inline-flex; align-items: center; gap: 0.6rem;
    background: #25D366; color: #fff;
    font-weight: 600; font-size: 0.95rem;
    padding: 0.85rem 2rem; border-radius: 100px;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 30px rgba(37,211,102,0.25);
    animation: fadeUp 0.8s 0.4s ease both;
  }
  .wsp:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(37,211,102,0.35); }

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(to right,
      var(--azul) 0 16.6%, var(--naranja) 16.6% 33.2%,
      var(--morado) 33.2% 49.8%, var(--cielo) 49.8% 66.4%,
      var(--rosa) 66.4% 83%, var(--rojo) 83% 100%);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="top-bar"></div>

<div class="dots">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<div class="logo">Catálogos<em>Digitales</em></div>

<h1>Algo <em>increíble</em><br>está en camino.</h1>
